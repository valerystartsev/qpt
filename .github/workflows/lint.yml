name: flake8 Lint

on: [push]

jobs:
   flake8-lint:
      runs-on: ubuntu-latest
      name: Lint
      steps:
         - name: Check out source repository
           uses: actions/checkout@v6
         - name: Set up Python environment
           uses: actions/setup-python@v6
           with:
             python-version: "3.13"
         - name: flake8 Lint
           uses: py-actions/flake8@v2
           with:
             ignore: "F401,W503"
             max-line-length: "120"

