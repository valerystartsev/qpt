name: Python autotests YAML

on:
  workflow_dispatch:
    inputs:
      deployment_target:
        description: Choose tests set
        required: true
        type: choice
        default: smoke
        options:
          - smoke
          - regression
          - extended
          - all

permissions: 
  contents: read
  pages: write
  id-token: write
  
jobs:
  download-history:
    runs-on: ubuntu-latest
    name: Download history
    steps:
      - name: Set up Python env
        uses: actions/setup-python@v6
        with:
           python-version: '3.14'
      - run: >
          ARTIFACT_ID=$(curl -L 
          -H "Accept: application/vnd.github+json" 
          -H "X-GitHub-Api-Version: 2022-11-28" 
          "https://api.github.com/repos/valerystartsev/qpt/actions/artifacts?name=allure-results" 
          | python3 -c "import sys, json; print(json.load(sys.stdin)['artifacts'][0]['id']);") 
          &&
          curl -L 
          -H "Accept: application/vnd.github+json" 
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" 
          -H "X-GitHub-Api-Version: 2022-11-28" 
          https://api.github.com/repos/valerystartsev/qpt/actions/artifacts/$ARTIFACT_ID/zip 
          -o artifacts.zip 
          &&
          REPORT_ID=$(curl -L 
          -H "Accept: application/vnd.github+json" 
          -H "X-GitHub-Api-Version: 2022-11-28" 
          "https://api.github.com/repos/valerystartsev/qpt/actions/artifacts?name=github-pages" 
          | python3 -c "import sys, json; print(json.load(sys.stdin)['artifacts'][0]['id']);") 
          &&
          curl -L 
          -H "Accept: application/vnd.github+json" 
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" 
          -H "X-GitHub-Api-Version: 2022-11-28" 
          https://api.github.com/repos/valerystartsev/qpt/actions/artifacts/$REPORT_ID/zip 
          -o pages.zip
      - run: mkdir allure-results && unzip artifacts.zip -d allure-results
      - run: mkdir old-pages pages_history && unzip pages.zip -d old_pages && tar -xvf old_pages/artifact.tar -C pages_history
      - run: cp -v -r pages_history/history allure-results
      - name: Store allure history
        uses: actions/upload-artifact@v6
        with:
          name: allure-results
          path: allure-results
          overwrite: true
          retention-days: 1

  run-tests:
    runs-on: ubuntu-latest
    name: Run python UI auto tests
    needs: download-history
    steps:
      - name: Set environment variable to force Node.js 24
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV
      - name: Check out autotests
        uses: actions/checkout@v6
      - name: Set up Python env
        uses: actions/setup-python@v6
        with:
           python-version: '3.14'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Download artifacts
        uses: actions/download-artifact@v8 
        with:
          name: allure-results
          path: allure-results
      - name: Run all tests
        if: "github.event.inputs.deployment_target == 'all'"
        run: pytest --alluredir=allure-results
        continue-on-error: true
      - name: Run smoke tests
        if: "github.event.inputs.deployment_target == 'smoke'"
        run: pytest -m smoke --alluredir=allure-results
        continue-on-error: true
      - name: Run regression tests
        if: "github.event.inputs.deployment_target == 'regression'"
        run: pytest -m regression --alluredir=allure-results
        continue-on-error: true
      - name: Run extended tests
        if: "github.event.inputs.deployment_target == 'extended'"
        run: pytest -m extended --alluredir=allure-results
        continue-on-error: true
      - name: Store Allure results to artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results
          path: allure-results
          retention-days: 1
          overwrite: true
          if-no-files-found: warn
      
          
  generate-report:
    runs-on: ubuntu-latest
    needs: run-tests
    name: Generate report
    steps:
      - name: Install Java
        uses: actions/setup-java@v5
        with:
          distribution: 'microsoft'
          java-version: '21'
      # 2. Install dependencies (including Allure)
      - name: Install Allure
        run: wget https://github.com/allure-framework/allure2/releases/download/2.38.1/allure-2.38.1.tgz 
      - name: unzip tar
        run: tar -zxvf allure-2.38.1.tgz -C /opt/
      - name: make link
        run: sudo ln -s /opt/allure-2.38.1/bin/allure /usr/local/bin/allure
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: allure-results
          path: allure-results
      - name: Generate Allure report
        run: allure generate -c allure-results -o _site 
      - name: Check if _site directory exists
        run: ls -la _site
      - name: Save Allure report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: _site
          path: _site
          retention-days: 1
          if-no-files-found: warn
             
  publish-report:
    name: Report publication 
    runs-on: ubuntu-latest
    needs: generate-report

    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
     - name: Set environment variable to force Node.js 24
       run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV
     - name: Download artifacts
       uses: actions/download-artifact@v8
       with:
         name: _site
         path: _site
     - name: Upload Pages artifact
       uses: actions/upload-pages-artifact@v4
       with:
         path: _site
     - name: Deploy to github Pages
       id: deployment
       uses: actions/deploy-pages@v5
  
          
        
